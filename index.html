
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FanCode Live Streaming | Watch Free</title>
  <link rel="shortcut icon" href="" />
  <!-- Tailwind + icons -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0f1c;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #edf2f7;
      line-height: 1.5;
    }

    /* spacious card with smooth transitions */
    .match-tile {
      background: #131d2f;
      border-radius: 32px;
      border: 1px solid #253247;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 15px 30px -10px rgba(0,0,0,0.8);
      transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1), border-color 0.2s, box-shadow 0.3s, background 0.2s;
      will-change: transform;
    }
    .match-tile:hover {
      background: #17253b;
      border-color: #3b82f6;
      transform: scale(1.02) translateY(-4px);
      box-shadow: 0 25px 40px -8px #1e3a8a40;
    }

    /* image zoom on hover */
    .img-wrapper {
      overflow: hidden;
      background: #0f1a2c;
      height: 210px;
      position: relative;
    }
    .match-img-spacious {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .match-tile:hover .match-img-spacious {
      transform: scale(1.05);
    }

    .live-badge-flat {
      background: #b91c1c;
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.35rem 1rem;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 4px 12px rgba(185, 28, 28, 0.4);
      animation: pulse-live 1.8s infinite;
    }
    @keyframes pulse-live {
      0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); }
      70% { box-shadow: 0 0 0 8px rgba(220, 38, 38, 0); }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
    }

    .btn-watch-live {
      background: #2563eb;
      border-radius: 50px;
      padding: 0.9rem 1rem;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: all 0.2s;
      width: 100%;
      border: none;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
    }
    .btn-watch-live:hover { background: #1d4ed8; transform: scale(1.01); }
    .btn-watch-live:active { transform: scale(0.98); }
    .btn-watch-live i { transition: transform 0.2s; }
    .btn-watch-live:hover i { transform: translateX(4px); }

    .btn-upcoming {
      background: transparent;
      border-radius: 50px;
      padding: 0.9rem 1rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      border: 1px solid #334155;
      margin-top: 0.5rem;
      pointer-events: none;
      opacity: 0.8;
    }

    /* skeleton shimmer animation */
    .skeleton-spacious {
      background: linear-gradient(90deg, #1b2538 25%, #263449 50%, #1b2538 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 32px;
      min-height: 430px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .divider-simple { height: 1px; background: #1f2a3c; width: 100%; }

    /* popup overlay â€“ hidden by default + entrance animation */
    #popup-24h {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }
    .popup-card {
      background: #152436;
      border-radius: 48px;
      max-width: 360px;
      width: 90%;
      padding: 2rem 1.8rem;
      border: 1px solid #2e405b;
      box-shadow: 0 30px 50px -10px black;
      text-align: center;
      transform: scale(0.95);
      animation: popupEntrance 0.3s 0.1s forwards;
      opacity: 0;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popupEntrance {
      0% { opacity: 0; transform: scale(0.9) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* header subtle float */
    .header-pill {
      transition: transform 0.3s, box-shadow 0.3s;
      animation: softFloat 4s infinite alternate ease-in-out;
    }
    @keyframes softFloat {
      0% { transform: translateY(0); box-shadow: 0 4px 10px rgba(0,40,100,0.3); }
      100% { transform: translateY(-3px); box-shadow: 0 12px 24px -8px #1e3a8a; }
    }

    /* loading dots for empty state (optional) */
    .pulse-dot {
      width: 8px; height: 8px; background: #3b82f6; border-radius: 50%;
      display: inline-block; margin: 0 2px;
      animation: pulse-dot 1.2s infinite;
    }
    @keyframes pulse-dot { 0%,100%{ opacity: 0.3; transform: scale(1); } 50%{ opacity: 1; transform: scale(1.3); } }

    /* line clamp */
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="p-5 max-w-7xl mx-auto">

  <!-- popup (24h snooze) with entrance animation -->
  <div id="popup-24h">
    <div class="popup-card">
      <div class="w-16 h-16 mx-auto bg-blue-600/30 rounded-full flex items-center justify-center text-3xl mb-4 animate-pulse">
        <i class="fas fa-bolt text-blue-400"></i>
      </div>
      <h2 class="text-2xl font-bold text-white mb-2">Join Live Alert</h2>
      <p class="text-gray-300 text-sm mb-6">Get Instant Notifications For Every Live Match. No Spam, Only Live Events.</p>
      <div class="flex flex-col gap-3">
        <a href="https://t.me/+7VkflslOE9s4YjQ9" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-full font-semibold flex items-center justify-center gap-2 text-base transition-all hover:gap-3"><i class="fab fa-telegram-plane"></i> Join Telegram</a>
        <button id="close-popup-btn" class="bg-transparent border border-gray-600 text-gray-300 py-3 rounded-full text-sm hover:bg-gray-800 transition">Already Joined</button>
      </div>
    </div>
  </div>

  <!-- header: with animation -->
  <div class="text-center mt-4 mb-8">
    <div class="inline-flex items-center justify-center gap-3 bg-[#131d2f] py-3 px-7 rounded-full border border-blue-900/50 header-pill">
      <i class="fas fa-bolt text-blue-500 text-xl animate-bounce" style="animation-duration: 1.8s;"></i>
      <span class="text-3xl font-black tracking-tight text-white">FANCODE</span>
    </div>
    <p class="text-gray-500 text-sm mt-3 tracking-wide flex items-center justify-center gap-2">
      <span class="w-1 h-1 bg-blue-500 rounded-full animate-pulse"></span>
      WEB BY @OffsideVerse
      <span class="w-1 h-1 bg-blue-500 rounded-full animate-pulse"></span>
    </p>
  </div>

  <!-- main grid â€“ spacious cards -->
  <div id="matches-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mt-6">
    <!-- taller skeletons with shimmer -->
    <div class="skeleton-spacious"></div>
    <div class="skeleton-spacious hidden sm:block"></div>
    <div class="skeleton-spacious hidden lg:block"></div>
  </div>

  <!-- divider footer with subtle fade -->
  <div class="mt-16 flex items-center gap-3 text-xs text-gray-600 opacity-80 hover:opacity-100 transition">
    <div class="divider-simple"></div>
    <span>Â© fancode Â· animated edition</span>
    <div class="divider-simple"></div>
  </div>

  <script>
    (function() {
      // anti iframe
      if (window.self !== window.top) {
        document.body.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0f1c;animation:fadeIn 0.3s"><div style="background:#151f2f;padding:2rem;border-radius:32px;"><i class="fas fa-shield-alt text-4xl text-red-400"></i><p style="margin-top:1rem;">direct access only</p></div></div>`;
        throw new Error('frame blocked');
      }

      // ---------- 24H POPUP LOGIC (with animation) ----------
      (function setupPopup() {
        const popup = document.getElementById('popup-24h');
        const closeBtn = document.getElementById('close-popup-btn');
        const POPUP_STORAGE_KEY = 'fancode_popup_24h';

        function shouldShowPopup() {
          const lastClosed = localStorage.getItem(POPUP_STORAGE_KEY);
          if (!lastClosed) return true;
          const last = parseInt(lastClosed, 10);
          if (isNaN(last)) return true;
          const now = Date.now();
          const hoursPassed = (now - last) / (1000 * 60 * 60);
          return hoursPassed >= 24;
        }

        function markPopupClosed() {
          localStorage.setItem(POPUP_STORAGE_KEY, Date.now().toString());
          // optional exit animation
          popup.style.animation = 'fadeIn 0.2s reverse';
          setTimeout(() => { popup.style.display = 'none'; }, 150);
        }

        window.addEventListener('load', () => {
          setTimeout(() => {
            if (shouldShowPopup()) {
              popup.style.display = 'flex';
            }
          }, 2000); // gentle delay after load
        });

        if (closeBtn) {
          closeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            markPopupClosed();
          });
        }
      })();

      // ---------- MATCHES RENDERING with dynamic animations ----------
      const container = document.getElementById('matches-container');
      const DATA_URL = 'https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json';
      const WATCH_BASE = 'https://offsideverse-fcplay2.vercel.app/?id=';

      function getActionButton(matchId, isLive) {
        if (isLive && matchId) {
          const a = document.createElement('a');
          a.href = WATCH_BASE + encodeURIComponent(matchId);
          a.className = 'btn-watch-live';
          a.innerHTML = '<i class="fas fa-play-circle"></i> WATCH NOW';
          a.target = '_blank';
          a.rel = 'noopener';
          return a;
        } else {
          const div = document.createElement('div');
          div.className = 'btn-upcoming';
          div.innerHTML = '<i class="far fa-clock"></i> NOT LIVE';
          return div;
        }
      }

      fetch(DATA_URL)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(data => {
          container.innerHTML = '';

          const matches = (data && Array.isArray(data.matches)) ? data.matches : [];
          if (matches.length === 0) {
            container.innerHTML = `
              <div class="col-span-full text-center py-28 bg-[#131d2f] rounded-3xl animate__animated" style="animation: fadeIn 0.5s;">
                <i class="fas fa-calendar-times text-5xl text-gray-500 mb-5"></i>
                <p class="text-2xl font-light text-gray-300">no live matches</p>
                <p class="text-gray-500 text-sm mt-2">check schedule later Â· <span class="inline-flex"><span class="pulse-dot"></span><span class="pulse-dot" style="animation-delay:0.2s"></span><span class="pulse-dot" style="animation-delay:0.4s"></span></span></p>
              </div>`;
            return;
          }

          const fragment = document.createDocumentFragment();

          matches.forEach((m, index) => {
            const matchId = String(m.match_id || m.id || '');
            const isLive = (m.status || '').toUpperCase() === 'LIVE';

            let imgUrl = m.image || '';
            if (!imgUrl && m.image_cdn) {
              imgUrl = m.image_cdn.APP || m.image_cdn.TATAPLAY || m.image_cdn.PLAYBACK || m.image_cdn.BG_IMAGE || '';
            }
            if (!imgUrl) imgUrl = 'https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg';

            const title = m.title || 'match';
            const tournament = m.tournament || '';
            const lang = m.language || (m.STREAMING_CDN && m.STREAMING_CDN.language) || '';
            const startTime = m.startTime || '';

            // card â€“ spacious
            const card = document.createElement('div');
            card.className = 'match-tile';
            // tiny staggered animation based on index (will appear gradually)
            card.style.animation = `fadeIn 0.4s ${index * 0.05}s both`;

            // image wrapper with zoom container
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'img-wrapper';

            const img = document.createElement('img');
            img.src = imgUrl;
            img.alt = title;
            img.loading = 'lazy';
            img.className = 'match-img-spacious';
            imgWrapper.appendChild(img);

            if (isLive) {
              const badge = document.createElement('span');
              badge.className = 'live-badge-flat absolute top-4 left-4';
              badge.innerHTML = '<i class="fas fa-circle text-[0.4rem] text-white mr-1"></i>LIVE';
              imgWrapper.appendChild(badge);
            } else {
              const scheduled = document.createElement('span');
              scheduled.className = 'absolute top-4 left-4 bg-black/50 text-white/80 text-[0.7rem] px-3 py-1 rounded-full backdrop-blur-sm';
              scheduled.innerHTML = '<i class="far fa-calendar-alt mr-1"></i>scheduled';
              imgWrapper.appendChild(scheduled);
            }

            card.appendChild(imgWrapper);

            // content
            const content = document.createElement('div');
            content.className = 'p-5 flex flex-col flex-1';

            const titleEl = document.createElement('h3');
            titleEl.className = 'font-bold text-white text-xl leading-tight line-clamp-2';
            titleEl.textContent = title;
            content.appendChild(titleEl);

            if (tournament || lang) {
              const meta = document.createElement('div');
              meta.className = 'flex flex-wrap gap-2 mt-3 text-sm';
              if (tournament) {
                const chip = document.createElement('span');
                chip.className = 'bg-[#1e2c40] text-gray-200 px-3 py-1 rounded-full text-xs';
                chip.textContent = tournament;
                meta.appendChild(chip);
              }
              if (lang) {
                const chipLang = document.createElement('span');
                chipLang.className = 'bg-[#1e2c40] text-gray-200 px-3 py-1 rounded-full text-xs';
                chipLang.innerHTML = '<i class="fas fa-globe mr-1"></i>' + lang;
                meta.appendChild(chipLang);
              }
              content.appendChild(meta);
            }

            if (startTime) {
              const timeRow = document.createElement('div');
              timeRow.className = 'flex items-center text-gray-400 text-sm mt-3';
              timeRow.innerHTML = '<i class="far fa-clock mr-2"></i>' + startTime;
              content.appendChild(timeRow);
            }

            if (isLive) {
              const liveIndicator = document.createElement('div');
              liveIndicator.className = 'flex items-center text-red-400 text-sm mt-2';
              liveIndicator.innerHTML = '<span class="w-2 h-2 bg-red-500 rounded-full mr-2 animate-ping opacity-75"></span><span class="animate-pulse">LIVE Now</span>';
              content.appendChild(liveIndicator);
            }

            content.appendChild(getActionButton(matchId, isLive));
            card.appendChild(content);
            fragment.appendChild(card);
          });

          container.appendChild(fragment);
        })
        .catch(err => {
          console.error(err);
          container.innerHTML = `
            <div class="col-span-full text-center py-28 bg-[#131d2f] rounded-3xl" style="animation: fadeIn 0.5s">
              <i class="fas fa-exclamation-triangle text-amber-500 text-5xl mb-5 animate-pulse"></i>
              <p class="text-2xl text-gray-200">failed to load</p>
              <p class="text-gray-400 text-sm mt-2">network issue Â· try again</p>
              <button onclick="window.location.reload()" class="mt-8 bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-full text-base transition-all hover:scale-105 active:scale-95"><i class="fas fa-sync-alt mr-2"></i>reload</button>
            </div>`;
        });
    })();
  </script>
